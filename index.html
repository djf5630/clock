<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>極致極光星空時光機</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
        }

        /* 森林星空背景：更深邃的歐洲夜晚 */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=2013&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.2);
            z-index: 0;
        }

        /* 特效層 */
        #canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
            mix-blend-mode: screen; /* 讓光影融合更自然 */
        }

        .container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%;
            pointer-events: none;
        }

        #time {
            font-size: clamp(4rem, 12vw, 9rem);
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 150, 0.6), 0 0 40px rgba(0,0,0,0.9);
            margin: 0; letter-spacing: 8px;
        }

        #quote {
            font-size: clamp(1rem, 3vw, 2rem);
            color: rgba(255, 255, 255, 0.85);
            margin-top: 30px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
            transition: opacity 1.5s;
            font-weight: 300;
        }

        #controls {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .btn {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; cursor: pointer; color: #fff;
            backdrop-filter: blur(10px);
            font-size: 0.9rem; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #00ff95; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div id="time">00:00:00</div>
        <div id="quote">點擊下方開啟寂靜星空</div>
    </div>

    <div id="controls">
        <button class="btn" onclick="toggleMusic()">🎵 播放星空樂章</button>
    </div>

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timeEl = document.getElementById('time');
        const quoteEl = document.getElementById('quote');
        const bgm = document.getElementById('bgm');

        let width, height, stars = [], shootingStars = [];
        let auroraTime = 0;
        let isMusicPlaying = false;

        function toggleMusic() {
            if (!isMusicPlaying) {
                bgm.play();
                isMusicPlaying = true;
                startQuoteRotation();
            } else {
                bgm.pause();
                isMusicPlaying = false;
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 100}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.8,
                opacity: Math.random(),
                blink: Math.random() * 0.01 + 0.005
            }));
        }

        // 核心極光繪製邏輯
        function drawAurora() {
            auroraTime += 0.003;
            const layers = [
                { color: 'rgba(0, 255, 149, 0.15)', amp: 60, freq: 0.001, speed: 1 },
                { color: 'rgba(138, 43, 226, 0.1)', amp: 80, freq: 0.0012, speed: 0.7 },
                { color: 'rgba(0, 200, 255, 0.08)', amp: 40, freq: 0.0008, speed: 1.2 }
            ];

            layers.forEach((l, index) => {
                ctx.save();
                ctx.beginPath();
                
                // 創建模糊光暈感
                ctx.shadowBlur = 40;
                ctx.shadowColor = l.color;
                
                const grad = ctx.createLinearGradient(0, height * 0.1, 0, height * 0.7);
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(0.5, l.color);
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.moveTo(0, height);

                for (let x = 0; x <= width; x += 10) {
                    // 使用多重正弦波模擬自然擾動
                    const noise = Math.sin(x * l.freq + auroraTime * l.speed + index) * l.amp;
                    const noise2 = Math.cos(x * 0.002 - auroraTime) * 20;
                    ctx.lineTo(x, height * 0.3 + noise + noise2);
                }

                ctx.lineTo(width, height);
                ctx.fill();
                ctx.restore();
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 1. 繪製極光 (底層)
            drawAurora();

            // 2. 繪製星星
            stars.forEach(s => {
                s.opacity += s.blink;
                if (s.opacity > 1 || s.opacity < 0) s.blink *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.opacity)})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 3. 繪製流星 (隨機觸發)
            if (Math.random() > 0.992) {
                shootingStars.push({
                    x: Math.random() * width + 200,
                    y: Math.random() * height * 0.4,
                    len: Math.random() * 120 + 60,
                    speed: Math.random() * 12 + 8,
                    opacity: 1
                });
            }
            shootingStars.forEach((ss, i) => {
                ss.x -= ss.speed;
                ss.y += ss.speed * 0.4;
                ss.opacity -= 0.015;
                
                ctx.save();
                ctx.strokeStyle = `rgba(255, 255, 255, ${ss.opacity})`;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#fff";
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(ss.x, ss.y);
                ctx.lineTo(ss.x + ss.len, ss.y - ss.len * 0.4);
                ctx.stroke();
                ctx.restore();
                
                if (ss.opacity <= 0) shootingStars.splice(i, 1);
            });

            requestAnimationFrame(draw);
        }

        const quotes = ["星光不問趕路人", "你的征途是星辰大海", "萬物皆有裂痕，那是光照進來的地方", "在寂靜中擁抱時光的流逝"];
        let qIdx = 0;

        function updateTime() {
            const now = new Date();
            timeEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        function startQuoteRotation() {
            setInterval(() => {
                quoteEl.style.opacity = 0;
                setTimeout(() => {
                    qIdx = (qIdx + 1) % quotes.length;
                    quoteEl.textContent = quotes[qIdx];
                    quoteEl.style.opacity = 1;
                }, 1500);
            }, 7000);
        }

        window.addEventListener('resize', init);
        init();
        draw();
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
