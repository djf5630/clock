<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>極光流星之夜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            cursor: pointer;
        }

        /* 靜態高品質背景圖層 */
        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1531306728370-e2eba9bd7bb1?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6); /* 調暗一點，讓文字和動態特效更明顯 */
            z-index: 0;
        }

        /* 動態 Canvas 特效層 */
        #star-canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
            mix-blend-mode: screen; /* 讓特效與背景完美融合 */
        }

        .container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%;
            pointer-events: none;
        }

        #time {
            font-size: 10rem; color: #fff;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.5), 0 0 10px rgba(0, 0, 0, 0.8);
            margin: 0; letter-spacing: 10px;
        }

        #quote-box { margin-top: 40px; height: 120px; display: flex; align-items: center; justify-content: center; }

        #quote {
            font-size: 2.5rem; color: #fff;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            letter-spacing: 4px; opacity: 1;
            transition: opacity 1.5s ease-in-out;
        }

        #audio-hint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 0.9rem; color: rgba(255,255,255,0.5); z-index: 20;
            letter-spacing: 2px;
        }
    </style>
</head>
<body onclick="startTwinkleOnly()">

    <div class="bg-image"></div>
    <div id="audio-hint">點擊螢幕開啟隨機星光音效</div>
    <canvas id="star-canvas"></canvas>

    <div class="container">
        <div id="time">00:00:00</div>
        <div id="quote-box">
            <div id="quote">正在仰望星空...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        const timeEl = document.getElementById('time');
        const quoteEl = document.getElementById('quote');

        let width, height, stars = [], shootingStars = [], audioCtx;

        // --- 音效功能 ---
        function startTwinkleOnly() {
            if (audioCtx) return;
            document.getElementById('audio-hint').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                if (Math.random() > 0.6) {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1500 + Math.random() * 1000, audioCtx.currentTime);
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.1);
                    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
                    osc.connect(g);
                    g.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2);
                }
            }, 3000);
        }

        // --- 星空與流星邏輯 ---
        class Star {
            constructor() { this.reset(); this.x = Math.random() * width; this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.blinkSpeed = Math.random() * 0.02 + 0.005;
                this.opacity = Math.random();
            }
            draw() {
                this.opacity += this.blinkSpeed;
                if (this.opacity > 1 || this.opacity < 0) this.blinkSpeed *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.opacity)})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class ShootingStar {
            constructor() { this.active = false; }
            spawn() {
                this.x = Math.random() * width; this.y = Math.random() * height * 0.5;
                this.len = Math.random() * 100 + 50;
                this.speed = Math.random() * 10 + 5;
                this.opacity = 1; this.active = true;
            }
            update() {
                if (!this.active) { if (Math.random() > 0.99) this.spawn(); return; }
                this.x -= this.speed; this.y += this.speed * 0.5; this.opacity -= 0.02;
                if (this.opacity <= 0) this.active = false;
            }
            draw() {
                if (!this.active) return;
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len * 0.5);
                ctx.stroke();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 100}, () => new Star());
            shootingStars = Array.from({length: 2}, () => new ShootingStar());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(s => s.draw());
            shootingStars.forEach(ss => { ss.update(); ss.draw(); });
            requestAnimationFrame(animate);
        }

        // --- UI 邏輯 ---
        const quotes = [
            "星光不問趕路人，時光不負有心人。", "你的征途是星辰大海，無須停留。",
            "穿越黑夜的人，終將擁抱黎明。", "萬物皆有裂痕，那是星光照進來的地方。",
            "即使身處陰溝，也要仰望星空。"
        ];
        let quoteIndex = 0;

        function updateTime() {
            const now = new Date();
            timeEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        function changeQuote() {
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                quoteEl.textContent = quotes[quoteIndex];
                quoteEl.style.opacity = 1;
            }, 1500);
        }

        window.addEventListener('resize', resize);
        resize(); animate();
        setInterval(updateTime, 1000);
        setInterval(changeQuote, 6000);
        updateTime(); changeQuote();
    </script>
</body>
</html>
