<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>星辰時光機 - 療癒音效版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            cursor: pointer;
        }

        #star-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%;
            pointer-events: none;
        }

        #time {
            font-size: 10rem; color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.4), 0 0 50px rgba(100, 150, 255, 0.2);
            margin: 0; letter-spacing: 10px;
        }

        #quote-box { margin-top: 40px; height: 120px; display: flex; align-items: center; justify-content: center; }

        #quote {
            font-size: 2.5rem; color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px; opacity: 1;
            transition: opacity 1.5s ease-in-out;
        }

        #audio-hint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 0.9rem; color: rgba(255,255,255,0.3); z-index: 20;
            letter-spacing: 2px;
        }
    </style>
</head>
<body onclick="startSpaceMusic()">

    <div id="audio-hint">點擊螢幕開啟宇宙音演算法</div>
    <canvas id="star-canvas"></canvas>

    <div class="container">
        <div id="time">00:00:00</div>
        <div id="quote-box">
            <div id="quote">正在連接星際頻譜...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        const timeEl = document.getElementById('time');
        const quoteEl = document.getElementById('quote');

        let width, height, stars = [];
        let audioCtx;

        // --- 音效功能：Web Audio 合成器 ---
        function startSpaceMusic() {
            if (audioCtx) return; // 防止重複啟動
            document.getElementById('audio-hint').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 建立深空底噪 (低頻暖音)
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.15;
            masterGain.connect(audioCtx.destination);

            const createDrone = (freq) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                g.gain.value = 0.05;
                osc.connect(g);
                g.connect(masterGain);
                osc.start();
                
                // 讓音量緩慢起伏，模擬呼吸感
                setInterval(() => {
                    const now = audioCtx.currentTime;
                    g.gain.exponentialRampToValueAtTime(Math.random() * 0.05 + 0.02, now + 2);
                }, 2000);
            };

            createDrone(60);  // 低音基底
            createDrone(90);  // 和弦增益

            // 2. 隨機「星光」音效 (高頻叮叮聲)
            setInterval(() => {
                if (Math.random() > 0.7) {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800 + Math.random() * 1200;
                    
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.1);
                    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 3);
                    
                    osc.connect(g);
                    g.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 3);
                }
            }, 4000);
        }

        // --- 星空背景邏輯 ---
        class Star {
            constructor() {
                this.reset();
                this.x = Math.random() * width;
            }
            reset() {
                this.x = width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.2 + 0.2;
                this.speed = Math.random() * 0.15 + 0.05;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x -= this.speed;
                if (this.x < 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) stars.push(new Star());
        }

        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        // --- UI 邏輯 ---
        const quotes = [
            "星光不問趕路人，時光不負有心人。", "你的征途是星辰大海，無須停留。", "即使身處陰溝，也要仰望星空。",
            "勇氣是壓力下，靈魂發出的恆星光芒。", "穿越黑夜的人，終將擁抱黎明。", "宇宙從不隨機，你的努力自帶引力。",
            "心有遠方，便能跨越任何荒蕪。", "向著月亮出發，即使迷失也落在星群。", "每一次破碎，都是生命大爆炸的前奏。",
            "萬物皆有裂痕，那是星光照進來的地方。", "渺小如塵埃，也要舞出震撼宇宙的光。", "在寂靜中進化，在孤獨的航行中爆發。"
        ];
        let quoteIndex = 0;

        function updateTime() {
            const now = new Date();
            timeEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        function changeQuote() {
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                quoteEl.textContent = quotes[quoteIndex];
                quoteEl.style.opacity = 1;
            }, 1500);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
        setInterval(updateTime, 1000);
        setInterval(changeQuote, 6000);
        updateTime();
        changeQuote();
    </script>
</body>
</html>
